<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>U COMPLETE TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #121212; color: #fff; text-align: center; font-family: sans-serif; }
        video { width: 90%; max-width: 800px; border: 3px solid #333; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; padding: 20px; }
        button { padding: 15px; cursor: pointer; background: #ff4757; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #ff6b81; }
    </style>
</head>
<body>

    <h1>U COMPLETE TV</h1>
    <video id="video" controls autoplay></video>

    <div class="grid">
        <button onclick="playChannel('https://cdn5.zohanayaan.com:1686/hls/telmunda.m3u8?md5=gGbsi4w1wtEnNbJDJFLd1Q&expires=1782815010')">Telmunda</button>
        <button onclick="playChannel('https://cdn7.zohanayaan.com:1686/hls/deportesplus9.m3u8?md5=dA4_FRWaj_GT46mvjHkxPA&expires=1782815031')">Deportes Plus 9</button>
        <button onclick="playChannel('https://cdn2.zohanayaan.com:1686/hls/bein1france.m3u8?md5=7zb1Fc3YWPpImBImeSA1ng&expires=1782815010')">Bein France 1</button>
        <button onclick="playChannel('https://cdn8.zohanayaan.com:1686/hls/ptvpk.m3u8?md5=2evzqxQIcWv6IG4uMxVbhg&expires=1782814969')">PTV Sports</button>
        <button onclick="playChannel('https://cdn3.zohanayaan.com:1686/hls/asportshd.m3u8?md5=MIBFQdGZ6fZNti9IRt2bPw&expires=1782814989')">A Sports HD</button>
        <button onclick="playChannel('https://cdn2.zohanayaan.com:1686/hls/willowextra.m3u8?md5=m93rEM5c89TNzpmn37J9MQ&expires=1782814989')">Willow Extra</button>
        <button onclick="playChannel('https://cdn4.zohanayaan.com:1686/hls/star1in.m3u8?md5=2j8Mj0AHMNd2M8shHaYXKA&expires=1782814969')">Star 1 India</button>
    </div>

    <script>
        const proxy = "https://my-proxy-worker.alizshawon1.workers.dev/proxy/";
        const video = document.getElementById('video');
        let hls;

        function playChannel(url) {
            if (hls) hls.destroy();
            hls = new Hls({
                xhrSetup: function(xhr, loadUrl) {
                    xhr.open('GET', proxy + loadUrl, true);
                }
            });
            hls.loadSource(proxy + url);
            hls.attachMedia(video);
            video.play();
        }
    </script>
</body>
</html>
