!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAWON TV</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        
        .brand-name { text-align: center; font-size: 2em; font-weight: bold; margin-bottom: 20px; color: #fff; text-transform: uppercase; letter-spacing: 2px; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        
        .card { 
            background: #fff; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer;
            border: 3px solid transparent;
            background-clip: padding-box, border-box;
            background-origin: padding-box, border-box;
            background-image: linear-gradient(to right, #fff, #fff), linear-gradient(45deg, #ff00ff, #00ffff, #ff0000);
            transition: transform 0.2s;
        }
        .card:hover { transform: scale(1.05); }
        
        .logo { width: 100%; height: 50px; object-fit: contain; }
        .sub-text { color: #555; font-size: 9px; font-weight: bold; margin-top: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="brand-name">SHAWON TV</div>

    <div class="grid">
        <!-- চ্যানেল ১ -->
        <div class="card" onclick="alert('চ্যানেল চলছে...')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/16/Jamuna_TV.png" class="logo">
            <div class="sub-text">SHAWON PLAY</div>
        </div>
        
        <!-- চ্যানেল ২ -->
        <div class="card" onclick="alert('চ্যানেল চলছে...')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Somoy_TV_logo.png" class="logo">
            <div class="sub-text">SHAWON PLAY</div>
        </div>

        <!-- চ্যানেল ৩ -->
        <div class="card" onclick="alert('চ্যানেল চলছে...')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/BTV_logo.png/200px-BTV_logo.png" class="logo">
            <div class="sub-text">SHAWON PLAY</div>
        </div>
    </div>

</body>
</html>
