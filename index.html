<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0b0e14; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .main-container { display: flex; gap: 20px; }
        
        /* ভিডিও প্লেয়ার সেকশন */
        .video-section { flex: 2; }
        .video-box { width: 100%; height: 450px; background: #000; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .status { margin-top: 10px; color: #ff0055; font-weight: bold; }

        /* চ্যানেল লিস্ট সেকশন */
        .sidebar { flex: 1; background: #161b22; padding: 15px; border-radius: 10px; }
        .channel-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .card { background: #fff; color: #000; padding: 10px 5px; border-radius: 8px; text-align: center; cursor: pointer; }
        .card:hover { border: 2px solid #00d4ff; }
        .c-name { font-size: 11px; font-weight: bold; }
        .s-play { color: #ff0055; font-size: 8px; font-weight: bold; margin-top: 3px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h2 style="margin-top: 0;">SHAWON TV LIVE</h2>

    <div class="main-container">
        <!-- ভিডিও এরিয়া -->
        <div class="video-section">
            <div class="video-box">Video Player</div>
            <div class="status">● এখন চলছে: BTV</div>
        </div>

        <!-- চ্যানেল লিস্ট এরিয়া -->
        <div class="sidebar">
            <div class="channel-grid">
                <!-- কার্ড ১ -->
                <div class="card">
                    <div class="c-name">BTV</div>
                    <div class="s-play">SHAWON PLAY</div>
                </div>
                <!-- কার্ড ২ -->
                <div class="card">
                    <div class="c-name">Jamuna TV</div>
                    <div class="s-play">SHAWON PLAY</div>
                </div>
                <!-- বাকি কার্ডগুলো এভাবে কপি করে বসান -->
            </div>
        </div>
    </div>

</body>
</html>
