<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0f172a; margin: 0; padding: 20px; font-family: sans-serif; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* ৪ কলাম */
            gap: 15px;
        }

        .channel-card {
            background: #fff;
            padding: 20px 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        /* কার্ডের ওপর সিলেক্ট করলে বা হোভার করলে বর্ডার */
        .channel-card:hover { border: 2px solid #2dd4bf; }

        .channel-name {
            font-size: 14px;
            font-weight: bold;
            color: #0f172a;
            margin-bottom: 5px;
        }

        .shawon-play-text {
            color: #e11d48; /* গোলাপি-লাল শেড */
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="grid-container">
    <!-- কার্ড ১ -->
    <div class="channel-card">
        <div class="channel-name">BTV</div>
        <div class="shawon-play-text">SHAWON PLAY</div>
    </div>

    <!-- কার্ড ২ -->
    <div class="channel-card">
        <div class="channel-name">Jamuna TV</div>
        <div class="shawon-play-text">SHAWON PLAY</div>
    </div>

    <!-- কার্ড ৩ -->
    <div class="channel-card">
        <div class="channel-name">Channel 24</div>
        <div class="shawon-play-text">SHAWON PLAY</div>
    </div>

    <!-- কার্ড ৪ -->
    <div class="channel-card">
        <div class="channel-name">Ekattor HD</div>
        <div class="shawon-play-text">SHAWON PLAY</div>
    </div>
    
    <!-- আপনি আপনার বাকি চ্যানেলগুলো এই একইভাবে যোগ করুন -->
</div>

</body>
</html>
