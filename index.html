<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>SHAWON PLAY - 100+ Live TV</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://unpkg.com/@videojs/http-streaming@3.7.0/dist/videojs-http-streaming.min.js"></script>

    <style>
        body { background: #0d0f1a; color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #player-area { flex: 2; padding: 20px; display: flex; flex-direction: column; }
        #my-video { width: 100%; height: 70vh; background: #000; border-radius: 8px; }
        #status { margin-top: 15px; color: #ff4d6d; font-weight: bold; font-size: 20px; }
        #sidebar { flex: 1; overflow-y: auto; padding: 20px; background: #0d0f1a; }
        #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .channel-btn { background: #1a1d2e; border: 1px solid #333; padding: 15px 5px; text-align: center; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .channel-btn:hover { background: #252a41; border-color: #ff4d6d; }
        .channel-btn h4 { margin: 0; font-size: 14px; }
        .channel-btn p { margin: 5px 0 0; color: #ff4d6d; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="player-area">
    <video id="my-video" class="video-js vjs-big-play-centered" controls></video>
    <div id="status">চ্যানেল নির্বাচন করুন</div>
</div>

<div id="sidebar">
    <div id="grid"></div>
</div>

<script>
    const channels = [
        { name: "BTV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8", group: "Bangladesh" },
        { name: "T Sports", url: "https://trs1.aynaott.com/tsports/index.m3u8", group: "Bangladesh" },
        { name: "Somoy TV", url: "https://live.thebosstv.com:30443/dwlive/Somoy-TV/chunks.m3u8", group: "Bangladesh" },
        { name: "Jamuna TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1701/output/index.m3u8", group: "Bangladesh" },
        { name: "Ekattor HD", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1705/output/index.m3u8", group: "Bangladesh" }
    ];

    const player = videojs('my-video');
    const grid = document.getElementById('grid');
    const status = document.getElementById('status');

    channels.forEach(ch => {
        const btn = document.createElement('div');
        btn.className = 'channel-btn';
        btn.innerHTML = `<h4>${ch.name}</h4><p>${ch.group}</p>`;
        
        btn.onclick = () => {
            const proxiedUrl = "https://corsproxy.io/?" + encodeURIComponent(ch.url);
            player.src({ src: proxiedUrl, type: 'application/x-mpegURL' });
            player.play();
            status.innerText = "এখন চলছে: " + ch.name;
        };
        grid.appendChild(btn);
    });
</script>
</body>
</html>
