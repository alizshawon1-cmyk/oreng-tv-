<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAWON PLAY</title>
    <style>
        body { 
            background-color: #000; 
            margin: 0; 
            padding: 10px; 
            font-family: sans-serif; 
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .channel-card {
            background: #fff;
            padding: 8px;
            border-radius: 12px;
            text-align: center;
            /* আপনার ছবির মতো রঙিন বর্ডার এফেক্ট */
            border: 3px solid #ff0055; 
            cursor: pointer;
            transition: transform 0.2s;
        }

        .channel-card:hover { transform: scale(1.05); }

        .logo-img { 
            width: 100%; 
            height: 40px; 
            object-fit: contain; 
        }

        .brand-text {
            color: #d10000; /* হালকা লাল রঙ */
            font-size: 8px;
            font-weight: bold;
            margin-top: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="grid-container">
    <!-- কার্ড ১ -->
    <div class="channel-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/16/Jamuna_TV.png" class="logo-img">
        <div class="brand-text">SHAWON PLAY</div>
    </div>

    <!-- কার্ড ২ -->
    <div class="channel-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Somoy_TV_logo.png" class="logo-img">
        <div class="brand-text">SHAWON PLAY</div>
    </div>

    <!-- কার্ড ৩ -->
    <div class="channel-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/BTV_logo.png/200px-BTV_logo.png" class="logo-img">
        <div class="brand-text">SHAWON PLAY</div>
    </div>
</div>

</body>
</html>
